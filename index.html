<!doctype html>
<html lang="en">
  <head>
    <link rel="canonical" href="https://sprite-to-aseprite.pages.dev/" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google-adsense-account" content="ca-pub-7611560030784765">
    <meta name="google-site-verification" content="To6ALN8wxj-uurcZkV_mWInwGwrAqoFizDjhMByldQY" />
    <meta
      name="description"
      content="Convert supported sprite files into editable Aseprite timelines in your browser without uploading artwork to a conversion server."
    />
    <title>Sprite to Aseprite Converter</title>
    <style>
      :root {
        color: #eef4f8;
        background: #0b1015;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        font-synthesis: none;
        line-height: 1.55;
      }

      * {
        box-sizing: border-box;
      }

      [hidden] {
        display: none !important;
      }

      body {
        margin: 0;
        background:
          radial-gradient(circle at 50% -12rem, rgba(67, 141, 219, 0.18), transparent 40rem),
          #0b1015;
      }

      #app {
        width: min(82rem, 100%);
        margin: 0 auto;
        padding: clamp(1rem, 3vw, 2.5rem);
      }

      header {
        margin-bottom: 1.25rem;
      }

      .panel {
        margin-bottom: 1rem;
        padding: clamp(1rem, 2vw, 1.35rem);
        border: 1px solid #2f3c49;
        border-radius: 0.9rem;
        background: #141b22;
        box-shadow: 0 1rem 2.5rem rgba(0, 0, 0, 0.12);
      }

      h1,
      h2,
      h3,
      p {
        margin-top: 0;
      }

      h1,
      h2,
      h3 {
        color: #f8fbfd;
        line-height: 1.2;
      }

      .privacy-notice {
        color: #9ddfb9;
      }

      .memory-warning {
        color: #ffd479;
      }

      label {
        display: grid;
        gap: 0.35rem;
        font-weight: 600;
      }

      input,
      select,
      button {
        min-height: 2.75rem;
        padding: 0.55rem 0.75rem;
        border: 1px solid #536477;
        border-radius: 0.55rem;
        color: inherit;
        background: #0d141a;
        font: inherit;
      }

      button:not(:disabled) {
        cursor: pointer;
        border-color: #4c91d9;
        background: #2467aa;
      }

      button:disabled {
        opacity: 0.48;
      }

      .grid-options,
      .workspace {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 1rem;
        margin-top: 1rem;
      }

      .grid-options legend {
        grid-column: 1 / -1;
      }

      .drop-zone {
        padding: clamp(1.5rem, 4vw, 2.5rem);
        border: 2px dashed #536b80;
        border-radius: 0.75rem;
        text-align: center;
        background: #0e151c;
      }

      [role="alert"] {
        color: #ffaaa5;
      }

      .download-area {
        margin-top: 1rem;
      }

      .conversion-progress {
        width: min(24rem, 100%);
        margin: 0.75rem 0;
      }

      .drop-zone[aria-disabled="true"] {
        opacity: 0.55;
      }

      ol {
        padding-left: 1.5rem;
      }

      @media (max-width: 44rem) {
        #app {
          padding: 1rem;
        }

        .grid-options,
        .workspace {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main id="app"></main>
    <script type="module" src="/src/index.ts"></script>
  </body>
</html>
