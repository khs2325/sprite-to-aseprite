id: "058"
title: Research LibreSprite and Aseprite input feasibility
status: backlog
priority: low
goal: Assess feasibility of reading `.ase` and `.aseprite` files as input before implementing a binary reader.
context: >
  LibreSprite and Aseprite input could enable round-trip and migration workflows,
  but binary input parsing should not distract from free/open project-format
  importers or weaken the existing exporter.
scope:
  summary: Document the likely binary chunk subset, validation needs, risks, and future task breakdown for `.ase`/`.aseprite` input.
  allowed_paths:
    - docs/aseprite-input-feasibility.md
    - docs/roadmap.md
    - docs/product-spec.md
  forbidden_paths: &forbidden
    - .github/workflows/**
    - .env
    - .env.*
    - dist/**
    - build/**
    - package.json
    - package-lock.json
    - src/**
    - tests/**
non_goals:
  - Do not implement a binary `.ase` or `.aseprite` reader.
  - Do not change the existing Aseprite exporter.
  - Do not claim round-trip fidelity before an input subset is tested.
requirements:
  - Research reading `.ase` and `.aseprite` as input.
  - Document the likely binary chunk subset needed for layers, frames, cels, opacity, duration, tags, palettes, and image data.
  - Identify unsupported chunk types and metadata that a future importer would reject or ignore only when safe and documented.
  - Document compatibility risks across Aseprite and LibreSprite versions.
  - Propose a future implementation sequence that starts with deterministic fixtures and a minimal safe reader.
  - Keep the task docs-only and avoid production code, dependencies, network behavior, or upload paths.
acceptance_criteria:
  - The feasibility document identifies the minimum viable chunk subset and key validation risks for future input support.
  - It clearly separates research from implementation and does not modify exporter behavior.
  - No importer, tests, fixtures, UI behavior, dependency, network fetch, or upload is added.
  - Typecheck, tests, and build pass.
verification:
  - npm run typecheck
  - npm run test
  - npm run build
auto_merge:
  allowed: true
  max_changed_files: 8
  forbidden_paths: *forbidden
