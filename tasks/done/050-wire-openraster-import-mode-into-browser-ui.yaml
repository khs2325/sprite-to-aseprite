id: "050"
title: Wire OpenRaster import mode into browser UI
status: backlog
priority: high
goal: Expose the implemented OpenRaster importer through the browser UI without changing importer logic.
context: >
  This task should happen only after task 049 adds a tested core `.ora`
  importer. UI wiring must preserve the browser-only processing promise and
  avoid overclaiming unsupported OpenRaster features.
scope:
  summary: Add `.ora` file selection, an OpenRaster project mode, conversion routing, status messages, selected-file cards, docs, and focused UI tests.
  allowed_paths:
    - src/app/fileImport.ts
    - src/app/fileImport.test.ts
    - src/app/converterUi.ts
    - src/app/converterUi.test.ts
    - src/styles.css
    - README.md
    - docs/manual-usage-guide.md
    - docs/product-spec.md
  forbidden_paths: &forbidden
    - .github/workflows/**
    - .env
    - .env.*
    - dist/**
    - build/**
    - package.json
    - package-lock.json
    - src/core/exporters/**
    - src/core/importers/gif/**
    - src/core/importers/apng/**
    - src/core/importers/piskel/**
non_goals:
  - Do not rewrite the OpenRaster importer or Aseprite exporter.
  - Do not claim unsupported groups, masks, effects, blend modes, or animation are preserved.
  - Do not add server-side processing or file upload.
requirements:
  - Add `.ora` to supported file acceptance and source-kind classification.
  - Add an `OpenRaster project` import mode.
  - Require exactly one `.ora` file and route it to the existing OpenRaster importer.
  - Show success text that accurately describes converting supported raster layer data into an editable Aseprite timeline.
  - Show importer-authored diagnostics without stack traces or private implementation details.
  - Update selected-file cards, remove/clear behavior, convert enablement, and docs for `.ora`.
  - Add focused UI tests for selection, labels, validation, conversion routing, success, and failure states.
acceptance_criteria:
  - Users can select one `.ora` file, choose `OpenRaster project`, convert it, and download the resulting `.aseprite` in the browser.
  - UI copy says supported layers are preserved only when the `.ora` file contains supported raster layer data.
  - Invalid selection and importer failure messages are clear and content-safe.
  - Typecheck, tests, and build pass.
verification:
  - npm run typecheck
  - npm run test
  - npm run build
auto_merge:
  allowed: false
  max_changed_files: 12
  forbidden_paths: *forbidden
