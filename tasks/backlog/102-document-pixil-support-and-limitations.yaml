id: "102"
title: Document Pixil support and limitations
status: backlog
priority: low
goal: Update user-facing documentation for Pixil/Pixilart support after the importer and UI wiring exist.
context: >
  Pixil documentation should reflect implemented behavior only. The converter
  should explain what data is preserved, what is unsupported, and that
  conversion remains browser-local.
scope:
  summary: Update README and docs supported-format guidance for the implemented Pixil subset.
  allowed_paths:
    - README.md
    - docs/manual-usage-guide.md
    - docs/product-spec.md
    - docs/supported-formats.md
    - docs/conversion-limitations.md
    - docs/privacy-browser-local.md
    - docs/pixil-format.md
  forbidden_paths: &forbidden
    - .github/workflows/**
    - .env
    - .env.*
    - dist/**
    - build/**
    - node_modules/**
    - package.json
    - package-lock.json
    - src/**
    - tests/**
non_goals:
  - Do not implement or change Pixil importer behavior.
  - Do not update docs ahead of actual tested support.
  - Do not claim full Pixil/Pixilart compatibility or lossless conversion.
  - Do not add ads, tracking, uploads, backend behavior, or payment processing.
requirements:
  - Update supported-format tables to list Pixil/Pixilart project-file support only when implementation exists.
  - Explain the supported `.pixil` subset and link to `docs/pixil-format.md`.
  - Explain what data is preserved, such as layers, frames, visibility, opacity, durations, and RGBA pixels only when the source and importer support them.
  - Explain unsupported Pixil/Pixilart features and that conversion may not be lossless.
  - Preserve accurate browser-local, no-upload privacy wording.
acceptance_criteria:
  - README and docs describe Pixil support accurately based on completed importer and UI behavior.
  - Documentation avoids overclaims about compatibility, losslessness, recovered layers, or server processing.
  - Typecheck, tests, and build pass.
verification:
  - npm run typecheck
  - npm run test
  - npm run build
auto_merge:
  allowed: true
  max_changed_files: 8
  forbidden_paths: *forbidden

