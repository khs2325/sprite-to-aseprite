id: "043"
title: Export Aseprite frame tags
status: backlog
priority: medium
goal: Encode validated SpriteProject frame tags in generated .aseprite files.
context: >
  This task follows the optional frame-tag model and JSON mapping from task 042.
  Projects without tags must remain byte-compatible with the existing supported output.
scope:
  summary: Add Aseprite frame-tag chunk encoding, validation boundaries, byte-level tests, and documentation.
  allowed_paths:
    - src/core/exporters/aseprite/**
    - src/core/conversion.integration.test.ts
    - docs/manual-usage-guide.md
    - README.md
  forbidden_paths: &forbidden
    - .github/workflows/**
    - .env
    - .env.*
    - dist/**
    - build/**
    - package.json
    - package-lock.json
    - src/core/importers/**
    - src/app/**
non_goals:
  - Do not change frame-tag parsing or add tag-editing UI.
  - Do not add unrelated Aseprite chunks such as slices, palettes, or user data.
  - Do not weaken existing writer validation.
requirements:
  - Write the documented Aseprite frame-tags chunk using the existing binary-writer architecture.
  - Map supported SpriteProject directions to exact Aseprite direction values.
  - Validate representable counts, frame ranges, UTF-8 names, and reserved fields before writing.
  - Preserve existing output behavior for projects whose frameTags field is absent or empty.
  - Add deterministic byte-level tests for multiple tags, directions, Unicode names, and invalid values.
  - Add an integration assertion that imported Aseprite JSON frame tags survive into generated bytes.
  - Update supported-output documentation without claiming full Aseprite feature parity.
acceptance_criteria:
  - Generated files contain structurally correct frame-tag chunks for supported tags.
  - Files without tags remain supported and existing exporter tests continue to pass.
  - Invalid or unrepresentable tag data is rejected before partial output is returned.
  - Typecheck, tests, and build pass.
verification:
  - npm run typecheck
  - npm run test
  - npm run build
auto_merge:
  allowed: false
  max_changed_files: 6
  forbidden_paths: *forbidden
