id: "051"
title: Research Pixelorama import and add deterministic fixtures
status: backlog
priority: medium
goal: Define a documented, fixture-backed Pixelorama `.pxo` import subset before implementing conversion.
context: >
  Pixelorama is a free/open pixel art tool with layers, frames, animation,
  tilemaps, and metadata. The converter must not guess undocumented semantics
  or silently accept unsupported project features.
scope:
  summary: Research Pixelorama save structure and add synthetic fixtures or builders for a safe initial subset when practical.
  allowed_paths:
    - docs/pixelorama-format.md
    - docs/roadmap.md
    - docs/product-spec.md
    - tests/fixtures/pixelorama/**
    - tests/fixtures/README.md
    - tests/fixtures/fixtures.test.ts
    - tests/fixtures/generate.mjs
  forbidden_paths: &forbidden
    - .github/workflows/**
    - .env
    - .env.*
    - dist/**
    - build/**
    - package.json
    - package-lock.json
    - src/**
non_goals:
  - Do not implement a Pixelorama importer or browser UI wiring.
  - Do not support tilemaps, effects, unsupported blend modes, unsupported layer types, or ambiguous metadata by assumption.
  - Do not use downloaded, copyrighted, private, or user-provided artwork as fixtures.
requirements:
  - Research the official/current Pixelorama `.pxo` save structure from project source or documented examples.
  - Document the supported subset, version expectations, embedded image-data representation, frame/layer structure, cel timing, visibility, opacity, names, and metadata mapping.
  - Identify unsupported features that must be rejected clearly, including tilemaps, effects, unsupported blend modes, unsupported layer types, missing image data, and ambiguous metadata.
  - Add deterministic tiny fixtures or fixture builders only if practical and the format structure is known enough to avoid guessing.
  - Document safe validation and allocation limits for browser-local parsing.
  - Keep fixture artwork synthetic and local.
acceptance_criteria:
  - "`docs/pixelorama-format.md` gives the importer task enough detail to avoid guessing."
  - Fixtures or fixture-generation notes prove the selected subset's layer/frame/timing semantics where practical.
  - No importer, UI behavior, production dependency, network fetch, or upload is added.
  - Typecheck, tests, and build pass.
verification:
  - npm run typecheck
  - npm run test
  - npm run build
auto_merge:
  allowed: true
  max_changed_files: 15
  forbidden_paths: *forbidden
