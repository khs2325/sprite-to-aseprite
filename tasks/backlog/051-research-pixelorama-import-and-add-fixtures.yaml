id: "051"
title: Research Pixelorama import and add deterministic fixtures
status: backlog
priority: medium
goal: Define a documented, fixture-backed Pixelorama `.pxo` import subset before implementing conversion.
context: >
  Pixelorama is a free/open pixel art tool with layers, frames, animation,
  tilemaps, and metadata. The converter must not guess undocumented semantics
  or silently accept unsupported project features.
scope:
  summary: Research Pixelorama save structure and add synthetic fixtures or builders for a safe initial subset.
  allowed_paths:
    - docs/pixelorama-format.md
    - docs/roadmap.md
    - docs/product-spec.md
    - tests/fixtures/pixelorama/**
    - tests/fixtures/README.md
    - tests/fixtures/fixtures.test.ts
    - tests/fixtures/generate.mjs
  forbidden_paths: &forbidden
    - .github/workflows/**
    - .env
    - .env.*
    - dist/**
    - build/**
    - package.json
    - package-lock.json
    - src/**
non_goals:
  - Do not implement a Pixelorama importer or browser UI wiring.
  - Do not support tilemaps, 3D layers, effects, or unsupported blend modes by assumption.
  - Do not use downloaded, copyrighted, private, or user-provided artwork as fixtures.
requirements:
  - Research the official/current Pixelorama save structure from source, documentation, or deterministic examples.
  - Document the supported `.pxo` subset, version expectations, embedded image-data representation, frame/layer structure, cel timing, visibility, opacity, and metadata mapping.
  - Identify unsupported features that must be rejected clearly, including tilemaps, 3D layers, effects, unsupported blend modes, and missing embedded image data.
  - Add deterministic tiny fixtures or fixture builders covering multi-frame and multi-layer data where the format structure is known.
  - Document safe validation and allocation limits for browser-local parsing.
  - Keep fixture artwork synthetic and local.
acceptance_criteria:
  - "`docs/pixelorama-format.md` gives the importer task enough detail to avoid guessing."
  - Fixtures or builders prove the selected subset's layer/frame/timing semantics.
  - No importer, UI behavior, production dependency, network fetch, or upload is added.
  - Typecheck, tests, and build pass.
verification:
  - npm run typecheck
  - npm run test
  - npm run build
auto_merge:
  allowed: true
  max_changed_files: 15
  forbidden_paths: *forbidden
