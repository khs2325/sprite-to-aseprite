id: "099"
title: Add Pixil file detection and UI acceptance
status: backlog
priority: medium
goal: Let the browser UI recognize `.pixil` files as Pixil/Pixilart project files before parser wiring.
context: >
  This task should follow task 098's documented import contract. It prepares
  file selection, labels, and help text while keeping actual Pixil parsing in a
  separate core importer task.
scope:
  summary: Add `.pixil` accept-list support, source-kind classification, labels, selected-file card behavior, help text, and focused tests.
  allowed_paths:
    - src/app/fileImport.ts
    - src/app/fileImport.test.ts
    - src/app/converterUi.ts
    - src/app/converterUi.test.ts
    - src/styles.css
    - README.md
    - docs/manual-usage-guide.md
    - docs/product-spec.md
    - docs/pixil-format.md
  forbidden_paths: &forbidden
    - .github/workflows/**
    - .env
    - .env.*
    - dist/**
    - build/**
    - node_modules/**
    - package.json
    - package-lock.json
    - src/core/importers/**
    - src/core/exporters/**
non_goals:
  - Do not parse Pixil file contents.
  - Do not route Pixil files through conversion yet unless the importer already exists.
  - Do not claim full Pixil compatibility or lossless conversion.
  - Do not add uploads, tracking, backend behavior, or dependencies.
requirements:
  - Add `.pixil` to supported source accept lists.
  - Add a Pixil/Pixilart source kind and selected-file label such as `Pixil project`.
  - Add or prepare an import-mode label such as `Pixil project` only if it can remain disabled or clearly explain that parser support is pending.
  - Show help text that Pixil support is a limited project-file import based on the documented subset.
  - Keep file processing browser-local and do not upload selected files.
  - Add focused tests for extension classification, accept strings, labels, remove/clear behavior, and disabled or pending conversion state.
acceptance_criteria:
  - "`.pixil` files are recognized in file selection and displayed with a clear Pixil/Pixilart label."
  - The UI does not attempt to parse or convert Pixil content before the importer task is complete.
  - User-facing copy says supported data can be preserved only when the project file contains that data and the importer supports it.
  - Typecheck, tests, and build pass.
verification:
  - npm run typecheck
  - npm run test
  - npm run build
auto_merge:
  allowed: true
  max_changed_files: 10
  forbidden_paths: *forbidden
