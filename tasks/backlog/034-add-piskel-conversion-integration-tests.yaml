id: "034"
title: Add Piskel conversion integration tests
status: backlog
priority: high
goal: Verify the supported .piskel to SpriteProject to .aseprite path with deterministic synthetic data.
context: This task follows the core Piskel importer from task 033 and uses the existing Aseprite exporter unchanged.
scope:
  summary: Extend conversion integration coverage for Piskel without broadening importer or exporter behavior.
  allowed_paths:
    - src/core/conversion.integration.test.ts
    - src/core/importers/piskel/**/*.test.*
    - tests/fixtures/piskel/**
    - tests/fixtures/fixtures.test.ts
  forbidden_paths: &forbidden
    - .github/workflows/**
    - .env
    - .env.*
    - dist/**
    - build/**
    - package.json
    - package-lock.json
    - src/app/**
    - src/core/exporters/**
non_goals:
  - Do not change the Piskel supported subset merely to make tests pass.
  - Do not modify Aseprite writer behavior or add unrelated formats.
  - Do not use network fixtures, uploads, or private artwork.
requirements:
  - Import a tiny synthetic multi-frame, multi-layer .piskel fixture, export the resulting SpriteProject with the existing Aseprite exporter, and inspect the generated bytes using existing test helpers.
  - Verify canvas dimensions, frame count, layer count, layer names and order, opacity/visibility, frame durations, cel placement, transparency, and representative pixel values.
  - Assert that the exported Aseprite structure contains the expected layer and cel chunks without claiming lossless support beyond the documented subset.
  - Keep fixtures tiny and deterministic and keep all processing local to the test process.
  - Add at least one integration-level rejection case for malformed or unsupported Piskel input.
acceptance_criteria:
  - The supported Piskel fixture converts through SpriteProject into deterministic, structurally valid Aseprite bytes.
  - Assertions prove that source layer data and animation timing survive the supported conversion path.
  - Existing PNG and spritesheet conversion integration tests remain unchanged in behavior and continue to pass.
  - Typecheck, tests, and build pass.
verification:
  - npm run typecheck
  - npm run test
  - npm run build
auto_merge:
  allowed: true
  max_changed_files: 5
  forbidden_paths: *forbidden
