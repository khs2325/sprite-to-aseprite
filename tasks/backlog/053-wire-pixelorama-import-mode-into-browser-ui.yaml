id: "053"
title: Wire Pixelorama import mode into browser UI
status: backlog
priority: medium
goal: Expose the implemented Pixelorama importer through the browser UI without changing importer logic.
context: >
  This task should happen only after task 052 adds a tested core `.pxo`
  importer. UI copy must be precise about supported Pixelorama features and
  browser-local processing.
scope:
  summary: Add `.pxo` selection, import mode labels, conversion routing, status messages, and focused UI tests.
  allowed_paths:
    - src/app/fileImport.ts
    - src/app/fileImport.test.ts
    - src/app/converterUi.ts
    - src/app/converterUi.test.ts
    - src/styles.css
    - README.md
    - docs/manual-usage-guide.md
    - docs/product-spec.md
  forbidden_paths: &forbidden
    - .github/workflows/**
    - .env
    - .env.*
    - dist/**
    - build/**
    - package.json
    - package-lock.json
    - src/core/exporters/**
    - src/core/importers/gif/**
    - src/core/importers/apng/**
    - src/core/importers/piskel/**
non_goals:
  - Do not rewrite the Pixelorama importer or Aseprite exporter.
  - Do not claim unsupported Pixelorama tilemaps, effects, 3D layers, or blend modes are preserved.
  - Do not add server-side processing or file upload.
requirements:
  - Add `.pxo` to supported file acceptance and source-kind classification.
  - Add a Pixelorama import mode with clear user-facing labels.
  - Require exactly one `.pxo` file and route it to the existing Pixelorama importer.
  - Show success text that describes converting supported frames/layers into an editable Aseprite timeline.
  - Show importer-authored diagnostics without stack traces or private implementation details.
  - Add selected-file card labels and focused UI tests for selection, removal, conversion enablement, success, and failure states.
acceptance_criteria:
  - Users can select one `.pxo` file, choose the Pixelorama mode, convert it, and download the resulting `.aseprite` in the browser.
  - UI copy says supported layers/frames are preserved only when the `.pxo` source contains supported raster data.
  - Invalid selection and importer failure messages are clear and content-safe.
  - Typecheck, tests, and build pass.
verification:
  - npm run typecheck
  - npm run test
  - npm run build
auto_merge:
  allowed: false
  max_changed_files: 12
  forbidden_paths: *forbidden
