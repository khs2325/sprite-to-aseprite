id: "052"
title: Implement Pixelorama importer
status: backlog
priority: medium
goal: Convert the documented Pixelorama `.pxo` subset into the canonical `SpriteProject` model.
context: >
  This task follows task 051's researched subset and fixtures. Pixelorama can
  contain animation and rich project data, so unsupported semantics must be
  rejected rather than invented.
scope:
  summary: Add Pixelorama parsing, validation, SpriteProject mapping, diagnostics, and focused tests.
  allowed_paths:
    - src/core/importers/pixelorama/**
    - src/core/conversion.integration.test.ts
    - tests/fixtures/pixelorama/**
    - tests/fixtures/fixtures.test.ts
    - docs/pixelorama-format.md
    - docs/product-spec.md
  forbidden_paths: &forbidden
    - .github/workflows/**
    - .env
    - .env.*
    - dist/**
    - build/**
    - package.json
    - package-lock.json
    - src/app/**
    - src/core/exporters/**
non_goals:
  - Do not wire `.pxo` into the browser UI.
  - Do not implement unsupported tilemaps, effects, unsupported blend modes, unsupported layer types, or undocumented metadata.
  - Do not add production dependencies unless a separate approved task widens package-file scope.
requirements:
  - Parse only the documented Pixelorama `.pxo` subset browser-locally.
  - Preserve supported frames, layers, layer names, order, visibility, opacity, cels, cel image data, and frame timing where documented.
  - Reject tilemaps, effects, unsupported blend modes, unsupported layer types, missing image data, unknown required versions, and ambiguous metadata clearly unless the researched subset explicitly supports them.
  - Validate dimensions, frame counts, layer counts, allocation limits, and unsafe integer values.
  - Output the canonical `SpriteProject` model without UI or exporter changes.
  - Add unit and conversion tests using task 051 fixtures.
acceptance_criteria:
  - Supported `.pxo` fixtures import with expected dimensions, frames, durations, layers, cels, visibility, opacity, names, and pixels.
  - Unsupported features fail with precise content-safe diagnostics and no stack traces.
  - No network, upload, UI behavior, or Aseprite writer change is introduced.
  - Typecheck, tests, and build pass.
verification:
  - npm run typecheck
  - npm run test
  - npm run build
auto_merge:
  allowed: false
  max_changed_files: 15
  forbidden_paths: *forbidden
